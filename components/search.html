<div class="search">

  <button class="search-button" id="openSearch">
    Si no encuentras el proyecto que buscas, haz click aquí
  </button>

  <div class="search-modal" id="searchModal">

    <div class="search-content">

      <span class="search-close" id="closeSearch">&times;</span>

      <h3 class="search-title">Buscar proyecto</h3>

      <!-- BUSCAR POR NOMBRE -->
      <div class="search-group">
        <input type="text" id="searchName" placeholder="Buscar por nombre">
        <button id="btnName">Buscar</button>
      </div>

      <!-- BUSCAR POR ID -->
      <div class="search-group">
        <input type="text" id="searchId" placeholder="Buscar por ID">
        <button id="btnId">Buscar</button>
      </div>

      <!-- BUSCAR POR DESCRIPCIÓN -->
      <div class="search-group">
        <input type="text" id="searchDesc" placeholder="Buscar por descripción">
        <button id="btnDesc">Buscar</button>
      </div>

      <!-- BUSCAR POR FECHA -->
      <div class="search-group">
        <input type="text" id="searchDate" placeholder="Buscar por fecha">
        <button id="btnDate">Buscar</button>
      </div>

      <p id="searchError" class="search-error"></p>

    </div>

  </div>

</div>
